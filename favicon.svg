  <path d="M270 345 C225 355, 175 330, 165 285 C160 265, 168 245, 180 230 C172 260, 180 290, 205 310 C225 328, 250 340, 270 345Z" fill="url(#rose)" opacity="0.7"/>
  <path d="M165 285 C158 240, 185 195, 230 178 C245 172, 256 165, 256 165 C235 178, 205 200, 192 225 C180 250, 170 268, 165 285Z" fill="url(#rose)" opacity="0.65"/>

