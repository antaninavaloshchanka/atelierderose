  <path d="M312 248 C316 275, 298 302, 272 310 C260 314, 248 310, 238 304 C255 310, 275 300, 288 282 C298 268, 306 255, 312 248Z" fill="#C4A4A4" opacity="0.8"/>
  <path d="M272 310 C248 318, 218 305, 212 280 C210 268, 215 258, 224 248 C218 265, 225 285, 242 298 C254 306, 264 310, 272 310Z" fill="#C4A4A4" opacity="0.8"/>
